<div class="min-h-screen flex flex-col items-center justify-center p-6">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Admin</h1>
  
  <div class="bg-white rounded-xl shadow p-6 max-w-md">
    <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2 flex items-center gap-2">
      <lucide-icon [img]="userPlusIcon" class="w-5 h-5"></lucide-icon>
      Créer un utilisateur
    </h2>
    
    <form [formGroup]="userForm" (ngSubmit)="onSubmitForm()">
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Nom</label>
        <input 
          type="text" 
          formControlName="nom"
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Prénom</label>
        <input 
          type="text" 
          formControlName="prenom"
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 mb-2">Rôle</label>
        <select 
          formControlName="role"
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="ETUDIANT">Étudiant</option>
          <option value="FORMATEUR">Formateur</option>
        </select>
      </div>
      
      <button 
        type="submit"
        [disabled]="userForm.invalid"
        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 disabled:bg-gray-300 transition"
      >
        Créer
      </button>
    </form>
  </div>
</div>
@if (showModal) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-md w-full mx-4">
      <h3 class="text-lg font-bold mb-4">Utilisateur créé</h3>
      <p class="text-gray-600 mb-2">Adresse email généré  :</p>
      <div class="bg-gray-100 p-3 rounded-lg font-mono text-center text-lg select-all">
        {{ generatedEmail }}
      </div>
      <p class="text-gray-600 mb-2">Mot de passe généré :</p>
      <div class="bg-gray-100 p-3 rounded-lg font-mono text-center text-lg select-all">
        {{ generatedPassword }}
      </div>
      <p class="text-sm text-red-500 mt-2">Notez ce mot de passe, il ne sera plus visible.</p>
      <button 
        (click)="closeModal()" 
        class="w-full mt-4 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition"
      >
        Fermer
      </button>
    </div>
  </div>
}
