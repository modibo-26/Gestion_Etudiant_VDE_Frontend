<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Créer un utilisateur</h2>
    
    <form [formGroup]="userForm" (ngSubmit)="onSubmitForm()">
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Nom</label>
        <input 
          type="text" 
          formControlName="nom"
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      
      <div class="mb-6">
        <label class="block text-gray-700 mb-2">Prenom</label>
        <input 
          type="text" 
          formControlName="prenom"
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 mb-2">Role</label>
        <select formControlName="role" name="role" id="role">
            <option value="ETUDIANT">Étudiant</option>
            <option value="FORMATEUR">Formateur</option>
        </select>
      </div>
      
      <button 
        type="submit"
        [disabled]="userForm.invalid"
        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 disabled:bg-gray-300"
      >
        VALIDER
      </button>
    </form>
  </div>
</div>
