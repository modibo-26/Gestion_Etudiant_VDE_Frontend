<div>
    <div (click)="onViewUser()" class="bg-white p-4 rounded-lg shadow hover:bg-green-100 transition cursor-pointer">
    <p class="font-semibold">{{ user.nom }} {{ user.prenom }}</p>
    @if (user.code) {
        <p class="text-sm text-gray-600">{{ user.code }}</p>
    } @else {
        <p class="text-sm text-red-600">{{ "Pas de code" }}</p>
    }
    </div>
</div>
