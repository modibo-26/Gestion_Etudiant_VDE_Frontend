@if (users$ | async; as users) {
  <p class="text-sm text-gray-500 mb-4">{{ users.length }} étudiants</p>
  @if (users.length === 0) {
    <p class="text-gray-500 text-center py-4">Aucun étudiant</p>
  } @else {
    <div class="space-y-3 max-h-96 overflow-y-auto" >
      @for (user of users; track user.id) {
          <app-user [user]="user"></app-user>
        }
    </div>
  }
}
