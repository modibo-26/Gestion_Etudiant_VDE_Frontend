<h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2 flex items-center gap-2">
  <lucide-icon [img]="usersIcon" class="w-5 h-5"></lucide-icon>
  Étudiants
</h2>
<input 
  type="text" 
  placeholder="Rechercher..." 
  [(ngModel)]="searchItem"
  (input)="search()"
  class="px-3 py-1 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-40"
>
@if (filteredUsers$ | async; as users) {
<p class="text-sm text-gray-500 mb-4">{{ users.length }} étudiants</p>
  @if (users.length === 0) {
    <p class="text-gray-500 text-center py-4">Aucun étudiant</p>
  } @else {
    <div class="space-y-3 max-h-96 overflow-y-auto" >
      @for (user of users; track user.id) {
          <app-user [user]="user"></app-user>
        }
    </div>
  }
}
