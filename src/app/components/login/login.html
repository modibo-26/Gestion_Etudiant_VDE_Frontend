<div class="min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-lg w-96">
    <h1 class="text-2xl font-bold text-blue-600 text-center mb-2">Village</h1>
    <p class="text-gray-500 text-center mb-6">Connectez-vous à votre compte</p>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmitForm()">
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Email</label>
        <input 
          type="email" 
          formControlName="email"
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="votre@email.com"
        />
      </div>
      
      <div class="mb-6">
        <label class="block text-gray-700 mb-2">Mot de passe</label>
        <input 
          type="password" 
          formControlName="password"
          class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="••••••••"
        />
      </div>
      
      <button 
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 disabled:bg-gray-300 transition"
      >
        Se connecter
      </button>
    </form>
  </div>
</div>
