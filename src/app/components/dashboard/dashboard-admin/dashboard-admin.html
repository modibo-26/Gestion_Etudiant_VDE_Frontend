<div class="max-w-7xl mx-auto p-6">
    @if( user$ | async; as user){<h1 class="text-2xl font-bold text-gray-800 mb-6">Administrateur : {{ user.prenom }} {{ user.nom }}</h1>}

    <div class="flex gap-2 mb-6">
        <button 
            (click)="changeTab('user')" 
            [class]="activeTab === 'user' ? 'bg-blue-500 text-white' : 'bg-white text-gray-700'"
            class="px-4 py-2 rounded-lg shadow hover:shadow-md transition">
            Utilisateurs
        </button>
        <button 
            (click)="changeTab('filiere-module')" 
            [class]="activeTab === 'filiere-module' ? 'bg-blue-500 text-white' : 'bg-white text-gray-700'"
            class="px-4 py-2 rounded-lg shadow hover:shadow-md transition">
            Filières et Modules
        </button>
    </div>

    @if (activeTab === "user") {

        
            <div class="min-h-screen flex flex-col items-center justify-center p-6">
  <h1 class="text-2xl font-bold text-gray-800 mb-8">Admin</h1>

  <!-- Conteneur principal en flex row -->
  <div class="flex flex-col lg:flex-row gap-8 w-full max-w-7xl">
    
    <!-- === SECTION TABLEAU DES UTILISATEURS === !-->
        <app-user-list></app-user-list>
    <!-- === SECTION FORMULAIRE CRÉATION === -->
        <app-user-form></app-user-form>
         </div>
</div>
    }
    @if (activeTab === "filiere-module") {
        <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <app-filiere-list [editable]="true" />
            </div>
            <div class="bg-white rounded-lg shadow p-2">
                <app-module-list [editable]="true" />
            </div>
        </div> 
    

    }
</div>
