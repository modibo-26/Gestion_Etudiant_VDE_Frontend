<div class="max-w-7xl mx-auto p-6">
    @if (filiere$ | async; as filiere) {
        <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ filiere.nom }}</h1>
        <p class="text-gray-600 mb-6">{{ filiere.description }}</p>
        
        <div class="grid grid-cols-2 gap-6">
            <!-- Gauche : Étudiants -->
            <div class="bg-white rounded-lg shadow p-4">
                <app-user-list [filiereId]="filiere.id"></app-user-list>
            </div>
        
            <!-- Droite : Modules (admin seulement) -->
            @if (isAdmin) {
                <div class="bg-white rounded-lg shadow p-4">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">Modules</h2>
                    @for (module of filiere.modules; track module.id) {
                        <app-module [deletable]="true" [module]="module" (onDelete)="removeModule(filiere.id, module.id)"></app-module>
                    } @empty {
                        <p class="text-gray-500">Aucun module associé à cette filière.</p>
                    }
                    <div class="mt-4">
                        <label class="block text-gray-700 mb-2">Ajouter un module :</label>
                        <select #moduleSelect class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            @for (module of modulesToAdd; track module.id) {
                                <option [value]="module.id">{{ module.nom }}</option>
                            }
                        </select>
                        <button 
                            (click)="addModule(filiere.id, +moduleSelect.value)" 
                            class="mt-2 w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition"
                            >
                            Ajouter le module
                        </button>
                    </div>
                </div>
            }
        </div>
    }    
</div>
